<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Card — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #020408; --neon-blue: #00b4ff; --neon-purple: #9b59ff; --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08); --text: #e8eaf0; --muted: rgba(232,234,240,0.5); }
    body { background: var(--black); color: var(--text); font-family: 'Syne', sans-serif; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: rgba(5,11,20,0.95); border-right: 1px solid var(--glass-border); padding: 32px 24px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 4px; color: #00f5ff; text-transform: uppercase; padding-bottom: 24px; border-bottom: 1px solid var(--glass-border); margin-bottom: 16px; }
    .nav-item { display: block; padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; color: var(--muted); letter-spacing: 1px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--text); }
    .nav-item.danger { margin-top: auto; color: rgba(255,100,100,0.6); }
    .nav-item.danger:hover { color: #ff6b6b; background: rgba(255,100,100,0.08); }
    .main { margin-left: 240px; padding: 40px; max-width: 900px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 36px; }
    .form-group { margin-bottom: 24px; }
    label { display: block; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    input[type=text], input[type=number], textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; transition: border-color 0.3s; }
    input[type=text]:focus, textarea:focus, input[type=number]:focus { border-color: rgba(0,180,255,0.4); }
    textarea { min-height: 200px; resize: vertical; line-height: 1.7; }
    input[type=file] { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 0; }
    .hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .btn-save { padding: 14px 40px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); border: none; border-radius: 6px; color: #fff; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s, transform 0.2s; }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-cancel { padding: 14px 28px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 6px; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; cursor: pointer; text-decoration: none; margin-left: 12px; transition: all 0.2s; }
    .btn-cancel:hover { color: var(--text); }
    .current-thumb { margin-top: 8px; }
    .current-thumb img { width: 120px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--glass-border); }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">● Admin Panel</div>
    <a href="/admin" class="nav-item active">📋 All Cards</a>
    <a href="/admin/add" class="nav-item">➕ Add Card</a>
    <a href="/" class="nav-item" target="_blank">🌐 View Site</a>
    <a href="/admin/logout" class="nav-item danger">⬅ Logout</a>
  </div>

  <div class="main">
    <h1>Edit Card</h1>
    <p class="sub">Editing: {{ card.title }}</p>

    <form method="POST" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" name="title" value="{{ card.title }}" required />
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" name="category" value="{{ card.category }}" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Icon (Emoji)</label>
          <input type="text" name="icon" value="{{ card.icon }}" />
        </div>
        <div class="form-group">
          <label>Display Order</label>
          <input type="number" name="order_index" value="{{ card.order_index }}" min="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Short Description *</label>
        <textarea name="description" rows="3" style="min-height:80px" required>{{ card.description }}</textarea>
      </div>

      <div class="form-group">
        <label>Full Content *</label>
        <textarea name="full_content" required>{{ card.full_content }}</textarea>
      </div>

      <div class="form-group">
        <label>Thumbnail Image</label>
        {% if card.thumbnail %}
        <div class="current-thumb">
          <img src="/static/{{ card.thumbnail }}" alt="Current thumbnail" />
          <p class="hint" style="margin-top:6px">Current thumbnail above. Upload new to replace.</p>
        </div>
        {% endif %}
        <input type="file" name="thumbnail" accept="image/*" style="margin-top:10px" />
      </div>

      <div style="display:flex;align-items:center;margin-top:8px;">
        <button type="submit" class="btn-save">Update Card</button>
        <a href="/admin" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
