<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Cyber Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #020408; --neon-blue: #00b4ff; --neon-purple: #9b59ff; --neon-cyan: #00f5ff;
      --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
      --text: #e8eaf0; --muted: rgba(232,234,240,0.5);
    }
    body {
      background: var(--black); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(13,71,161,0.2), transparent 70%);
      pointer-events: none;
    }
    .login-box {
      background: rgba(10,22,40,0.8);
      border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 400px;
      backdrop-filter: blur(20px);
      position: relative; z-index: 1;
    }
    .login-tag {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 4px; color: var(--neon-cyan);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .login-title { font-size: 28px; font-weight: 800; margin-bottom: 32px; }
    .alert {
      padding: 12px 16px; border-radius: 6px; margin-bottom: 20px;
      font-family: 'DM Mono', monospace; font-size: 12px;
      background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3);
      color: #ff6b6b;
    }
    label {
      display: block; font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 8px;
    }
    input {
      width: 100%; padding: 12px 16px; margin-bottom: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border); border-radius: 6px;
      color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.3s;
    }
    input:focus { border-color: rgba(0,180,255,0.4); }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      border: none; border-radius: 6px;
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--muted); text-decoration: none; letter-spacing: 2px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--neon-cyan); }
    .warning {
      margin-top: 24px; padding: 12px 16px; border-radius: 6px;
      background: rgba(155,89,255,0.08); border: 1px solid rgba(155,89,255,0.2);
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: rgba(155,89,255,0.7); letter-spacing: 1px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-tag">● Restricted Access</div>
    <h1 class="login-title">Admin Login</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert">⚠ {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autocomplete="off" />
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required />
      <button type="submit">Access Dashboard</button>
    </form>
    <a href="/" class="back-link">← Back to site</a>
    <div class="warning">🔒 Private Admin Area</div>
  </div>
</body>
</html>
